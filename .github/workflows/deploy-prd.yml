name: Deploy Prd

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 4"

permissions: {}

concurrency:
  group: ${{ github.workflow }}

jobs:
  detect-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      terraform: ${{ steps.changes.outputs.terraform }}
    steps:
      - id: changes
        uses: frasermolyneux/actions/detect-changes@main
        with:
          filters: |
            src:src/**
            terraform:terraform/**

  terraform-state-check-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    runs-on: ubuntu-latest
    outputs:
      has_resources: ${{ steps.state-check.outputs.has_resources }}
    steps:
      - id: state-check
        uses: frasermolyneux/actions/terraform-state-check@terraform-state-check/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  build-and-test:
    needs:
      - detect-changes
      - terraform-state-check-dev
    if: |
      !failure() && !cancelled() && (needs.detect-changes.outputs.src == 'true' || needs.terraform-state-check-dev.outputs.has_resources != 'true')
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.web-ci.outputs.build_version }}
    steps:
      - id: web-ci
        uses: frasermolyneux/actions/dotnet-web-ci@dotnet-web-ci/v1.4
        with:
          dotnet-project: "MX.TravelItinerary.Web"
          dotnet-version: 9.0.x
          src-folder: "src"
          skip-nuget-artifact-upload: "true"

  terraform-plan-and-apply-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true' || needs.terraform-state-check-dev.outputs.has_resources != 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - if: needs.detect-changes.outputs.terraform != 'true' && needs.terraform-state-check-dev.outputs.has_resources == 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output-dev
        shell: bash
        run: |
          cd terraform
          echo "web_app_resource_group_name=$(terraform output -raw web_app_resource_group_name)" >> $GITHUB_OUTPUT
          echo "web_app_name=$(terraform output -raw web_app_name)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

    outputs:
      web_app_resource_group_name: ${{ steps.terraform-output-dev.outputs.web_app_resource_group_name }}
      web_app_name: ${{ steps.terraform-output-dev.outputs.web_app_name }}

  app-service-deploy-dev:
    if: |
      !failure() && !cancelled() && github.event_name != 'schedule' && (needs.detect-changes.outputs.src == 'true' || needs.terraform-state-check-dev.outputs.has_resources != 'true')
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
      - terraform-plan-and-apply-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - uses: frasermolyneux/actions/deploy-app-service@deploy-app-service/v1.2
        with:
          web-artifact-name: "MX.TravelItinerary.Web"
          web-app-name: ${{ needs.terraform-plan-and-apply-dev.outputs.web_app_name }}
          resource-group-name: ${{ needs.terraform-plan-and-apply-dev.outputs.web_app_resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for web app version ${{ needs.build-and-test.outputs.build_version }}
        shell: bash
        run: |
          EXPECTED_VERSION="${{ needs.build-and-test.outputs.build_version }}"
          INFO_URL="https://${{ needs.terraform-plan-and-apply-dev.outputs.web_app_name }}.azurewebsites.net/info"
          echo "Waiting for $INFO_URL to report version '$EXPECTED_VERSION'..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl -s "$INFO_URL" || true)
            CURRENT_VERSION=$(echo "$RESPONSE" | jq -r '.buildVersion // empty' 2>/dev/null || true)
            if [ "$CURRENT_VERSION" = "$EXPECTED_VERSION" ]; then
              echo "Web app is running expected version '$EXPECTED_VERSION' (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got version '$CURRENT_VERSION' - waiting 10s..."
            sleep 10
          done
          echo "Web app did not report expected version '$EXPECTED_VERSION' in time (last seen: '$CURRENT_VERSION')"
          exit 1

  terraform-plan-and-apply-prd:
    if: |
      !failure() && !cancelled() && (needs.terraform-plan-and-apply-dev.result == 'success' || github.event_name == 'schedule')
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - build-and-test
      - terraform-plan-and-apply-dev
      - app-service-deploy-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - if: needs.detect-changes.outputs.terraform != 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output-prd
        shell: bash
        run: |
          cd terraform
          echo "web_app_resource_group_name=$(terraform output -raw web_app_resource_group_name)" >> $GITHUB_OUTPUT
          echo "web_app_name=$(terraform output -raw web_app_name)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

    outputs:
      web_app_resource_group_name: ${{ steps.terraform-output-prd.outputs.web_app_resource_group_name }}
      web_app_name: ${{ steps.terraform-output-prd.outputs.web_app_name }}

  app-service-deploy-prd:
    if: |
      !failure() && !cancelled() && needs.terraform-plan-and-apply-prd.result == 'success' && needs.detect-changes.outputs.src == 'true'
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - build-and-test
      - terraform-plan-and-apply-prd
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - uses: frasermolyneux/actions/deploy-app-service@deploy-app-service/v1.2
        with:
          web-artifact-name: "MX.TravelItinerary.Web"
          web-app-name: ${{ needs.terraform-plan-and-apply-prd.outputs.web_app_name }}
          resource-group-name: ${{ needs.terraform-plan-and-apply-prd.outputs.web_app_resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for web app version ${{ needs.build-and-test.outputs.build_version }}
        shell: bash
        run: |
          EXPECTED_VERSION="${{ needs.build-and-test.outputs.build_version }}"
          INFO_URL="https://${{ needs.terraform-plan-and-apply-prd.outputs.web_app_name }}.azurewebsites.net/info"
          echo "Waiting for $INFO_URL to report version '$EXPECTED_VERSION'..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl -s "$INFO_URL" || true)
            CURRENT_VERSION=$(echo "$RESPONSE" | jq -r '.buildVersion // empty' 2>/dev/null || true)
            if [ "$CURRENT_VERSION" = "$EXPECTED_VERSION" ]; then
              echo "Web app is running expected version '$EXPECTED_VERSION' (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got version '$CURRENT_VERSION' - waiting 10s..."
            sleep 10
          done
          echo "Web app did not report expected version '$EXPECTED_VERSION' in time (last seen: '$CURRENT_VERSION')"
          exit 1
